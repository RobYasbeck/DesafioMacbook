<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafio Macbook · Busca Orgânica</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;font-family:'Segoe UI',system-ui,sans-serif}
.wrap{text-align:center;max-width:520px;width:100%;position:relative;z-index:1}
.badge-top{display:inline-flex;align-items:center;gap:8px;background:#16161f;border:1px solid #2a2a3e;border-radius:999px;padding:6px 18px;font-size:11px;color:#9090b0;letter-spacing:.08em;text-transform:uppercase;margin-bottom:36px}
.badge-dot{width:7px;height:7px;border-radius:50%;background:#00ff88;flex-shrink:0}
.icon{font-size:72px;margin-bottom:24px;line-height:1;display:block}
.ttl{font-size:clamp(28px,6vw,46px);font-weight:800;letter-spacing:-.02em;line-height:1.1;color:#f0f0fa;margin-bottom:16px}
.ttl em{color:#00ff88;font-style:normal}
.divider{width:48px;height:3px;background:#00ff88;border-radius:999px;margin:0 auto 24px}
.msg{font-size:16px;color:#9090b0;line-height:1.7;max-width:380px;margin:0 auto 36px}
.msg strong{color:#f0f0fa}
.card-end{background:#16161f;border:1px solid #2a2a3e;border-radius:14px;padding:24px 28px;display:inline-block;margin-bottom:40px;text-align:left;min-width:280px}
.card-end-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#6b6b8a;margin-bottom:10px}
.card-end-row{font-size:13px;color:#9090b0;font-weight:500;margin-bottom:6px}
.card-end-row:last-child{margin-bottom:0}
.card-end-row em{color:#00ff88;font-style:normal;font-weight:700}
.footer{font-size:11px;color:#2a2a3e}
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.star{position:absolute;width:2px;height:2px;border-radius:50%;background:#00ff88;opacity:0;animation:twinkle var(--d) ease-in-out infinite var(--delay)}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(1)}50%{opacity:var(--op);transform:scale(1.5)}}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrap">
  <div class="badge-top">
    <div class="badge-dot"></div>
    Busca Orgânica · SEO
  </div>

  <span class="icon">🏁</span>

  <div class="ttl">Campanha<br><em>Encerrada</em></div>
  <div class="divider"></div>

  <p class="msg">
    O <strong>Desafio Macbook</strong> chegou ao fim.<br>
    Obrigado a todos que participaram e deram o seu melhor durante a campanha!
  </p>

  <div class="card-end">
    <div class="card-end-label">Meta geral da campanha</div>
    <div class="card-end-row">Objetivo: <em>R$ 90.000</em> em vendas</div>
    <div class="card-end-row">Atingimos: <em>68%</em> da meta</div>
  </div>

  <div class="footer">Busca Orgânica © 2026</div>
</div>

<script>
var stars=document.getElementById('stars');
for(var i=0;i<60;i++){
  var s=document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.setProperty('--d',(3+Math.random()*5)+'s');
  s.style.setProperty('--delay',(-Math.random()*6)+'s');
  s.style.setProperty('--op',(0.15+Math.random()*0.5)+'');
  var size=Math.random()<0.3?3:2;
  s.style.width=size+'px';
  s.style.height=size+'px';
  stars.appendChild(s);
}
</script>
</body>
</html>
